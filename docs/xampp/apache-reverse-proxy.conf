# XAMPP Apache reverse proxy (Comptrol‑MEF)
#
# Requisitos en Apache (httpd.conf):
# - LoadModule proxy_module modules/mod_proxy.so
# - LoadModule proxy_http_module modules/mod_proxy_http.so
# - LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
# - LoadModule headers_module modules/mod_headers.so
#
# Sugerencia: incluir este bloque en:
#   C:\xampp\apache\conf\extra\httpd-vhosts.conf
# y reiniciar Apache desde el panel de XAMPP.

ProxyPreserveHost On
ProxyRequests Off

# Web (Next.js)
ProxyPass        /comptrol/ http://127.0.0.1:3000/
ProxyPassReverse /comptrol/ http://127.0.0.1:3000/

# WebSockets (HMR en dev)
ProxyPass        /comptrol/_next/webpack-hmr ws://127.0.0.1:3000/_next/webpack-hmr
ProxyPassReverse /comptrol/_next/webpack-hmr ws://127.0.0.1:3000/_next/webpack-hmr

# API (NestJS)
ProxyPass        /comptrol-api/ http://127.0.0.1:3001/
ProxyPassReverse /comptrol-api/ http://127.0.0.1:3001/

# Opcional: CORS (si mantienes dominios distintos)
Header always set Access-Control-Allow-Origin "*"
Header always set Access-Control-Allow-Headers "Authorization, Content-Type"
Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"

